<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MixQZero AI Chat | Beta</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ЦВЕТОВЫЕ ПАЛИТРЫ (ТЕМЫ) */
        :root, [data-theme="dark"] {
            --bg-dark: #0b0f19;
            --sidebar-bg: #111827;
            --chat-bg: #131c2e;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --msg-user: #4f46e5;
            --msg-ai: #1f293d;
            --border-color: rgba(255, 255, 255, 0.05);
            --modal-bg: #111827;
        }

        [data-theme="purple"] {
            --bg-dark: #12072b;
            --sidebar-bg: #1a0b36;
            --chat-bg: #1e0d3d;
            --accent: #d946ef;
            --accent-glow: rgba(217, 70, 239, 0.15);
            --text-main: #fdf4ff;
            --text-muted: #c084fc;
            --msg-user: #a21caf;
            --msg-ai: #2e104d;
            --border-color: rgba(255, 255, 255, 0.06);
            --modal-bg: #1a0b36;
        }

        [data-theme="light"] {
            --bg-dark: #f3f4f6;
            --sidebar-bg: #ffffff;
            --chat-bg: #f9fafb;
            --accent: #4f46e5;
            --accent-glow: rgba(79, 70, 229, 0.1);
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --msg-user: #4f46e5;
            --msg-ai: #f3f4f6;
            --border-color: rgba(0, 0, 0, 0.08);
            --modal-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        /* Плавное появление всего сайта при входе */
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            overflow: hidden;
            opacity: 0;
            animation: appFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* Боковая панель */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 100;
            transition: transform 0.3s ease, background-color 0.3s;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .logo-icon {
            font-size: 22px;
            background: linear-gradient(135deg, var(--accent), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo h2 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .new-chat-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px dashed var(--accent);
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            margin-bottom: 25px;
            flex-shrink: 0;
        }

        .new-chat-btn:hover {
            background: var(--accent-glow);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Список чатов */
        .sidebar-content {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
        }

        .sidebar-content::-webkit-scrollbar { width: 4px; }
        .sidebar-content::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        .chat-history-item {
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-history-item:hover, .chat-history-item.active {
            background: var(--accent-glow);
            border-color: rgba(99, 102, 241, 0.2);
            color: var(--text-main);
        }
        
        .delete-chat-btn {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            font-size: 14px;
            padding-left: 5px;
        }
        
        .chat-history-item:hover .delete-chat-btn { opacity: 1; }

        .sidebar-footer {
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        /* Кнопка настроек в футере */
        .settings-btn-trigger {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }
        .settings-btn-trigger:hover {
            background: rgba(255,255,255,0.07);
        }

        /* Зона чата */
        .chat-container {
            flex-grow: 1;
            background-color: var(--chat-bg);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            transition: background-color 0.3s;
        }

        .chat-header {
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(19, 28, 46, 0.4);
            backdrop-filter: blur(12px);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .menu-toggle-btn, .header-add-btn {
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        
        .header-add-btn { font-size: 26px; }

        .model-info h3 {
            font-size: 15px;
            font-weight: 600;
        }

        .model-info p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .messages-container {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .messages-container::-webkit-scrollbar { width: 6px; }
        .messages-container::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out forwards;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user-message {
            background-color: var(--msg-user);
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.2);
        }

        .ai-message {
            background-color: var(--msg-ai);
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .loading-dots span {
            animation: blink 1.4s infinite both;
            font-weight: bold;
            display: inline-block;
            font-size: 20px;
        }
        .loading-dots span:nth-child(2) { animation-delay: .2s; }
        .loading-dots span:nth-child(3) { animation-delay: .4s; }

        /* Поле ввода ввода переходящее наверх при заполнении строки */
        .chat-input-area {
            padding: 15px 30px 25px 30px; 
            background: linear-gradient(transparent, var(--chat-bg) 30%);
            flex-shrink: 0; 
        }

        .input-wrapper {
            display: flex;
            background-color: rgba(31, 41, 61, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 10px 14px;
            align-items: flex-end; /* Выравнивание кнопок по нижнему краю при росте инпута */
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Заменили input на textarea для автопереноса строк наверх */
        .input-wrapper textarea {
            flex-grow: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 15px;
            padding: 4px 8px;
            resize: none;
            max-height: 180px;
            min-height: 24px;
            line-height: 1.4;
        }

        .input-wrapper button {
            background: var(--accent);
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .input-wrapper button:hover { background: #4f46e5; }
        .input-wrapper button svg { width: 18px; height: 18px; fill: white; }

        /* ОКНО НАСТРОЕК (МЕНЮ) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .settings-modal {
            background-color: var(--modal-bg);
            border: 1px solid var(--border-color);
            width: 420px;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform: scale(0.92);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .modal-overlay.open .settings-modal {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h4 { font-size: 18px; font-weight: 600; }
        .close-modal-btn {
            background: transparent; border:none; color: var(--text-muted);
            font-size: 20px; cursor: pointer;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .setting-group label { font-size: 13px; color: var(--text-muted); font-weight: 500; }
        
        .setting-group select {
            width: 100%; padding: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px; outline: none; cursor: pointer;
        }
        .setting-group select option { background: var(--sidebar-bg); }

        .settings-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
        }
        .settings-link-btn {
            width: 100%; padding: 11px;
            background: var(--accent-glow);
            border: 1px solid transparent;
            color: var(--text-main);
            text-align: center; border-radius: 8px;
            text-decoration: none; font-size: 14px; font-weight: 500;
            transition: all 0.2s;
        }
        .settings-link-btn:hover {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.25);
        }

        .modal-footer-status {
            font-size: 12px; color: var(--text-muted);
            text-align: center; border-top: 1px solid var(--border-color);
            padding-top: 15px; margin-top: 5px;
        }
        .status-online { color: #10b981; font-weight: 600; }

        .sidebar-overlay {
            display: none; position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); z-index: 90;
        }

        .menu-toggle-btn { display: none; }

        /* АДАПТИВНОСТЬ */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute; top: 0; left: 0; bottom: 0;
                transform: translateX(-100%);
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar.open + .sidebar-overlay { display: block; }
            .menu-toggle-btn { display: block; }

            .chat-header { padding: 15px 20px; }
            .messages-container { padding: 20px; }
            .message { max-width: 85%; font-size: 14px; }
            .chat-input-area { padding: 10px 15px 25px 15px; }

            /* Настройки почти во весь экран на смартфонах */
            .settings-modal {
                width: 90%;
                max-height: 85vh;
                padding: 20px;
            }
        }

        @keyframes appFadeIn { to { opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0%, 100% { opacity: .2; } 20% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Боковая панель -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <span class="logo-icon">⚡</span>
                <h2 id="logoText">MixQZero AI | Beta</h2>
            </div>
            <button class="new-chat-btn" id="newChatBtnSide" onclick="startNewChat()">+ Новый чат</button>
            
            <div class="sidebar-content" id="chatsList"></div>
            
            <div class="sidebar-footer">
                <button class="settings-btn-trigger" onclick="openModal()" id="settingsBtnLabel">
                    ⚙️ Настройки
                </button>
            </div>
        </aside>

        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

        <!-- Главное окно чата -->
        <main class="chat-container">
            <header class="chat-header">
                <div class="header-left">
                    <button class="menu-toggle-btn" onclick="toggleSidebar()">☰</button>
                    <div class="model-info">
                        <h3>Gemini 3.1 Flash Lite</h3>
                        <p id="serverTariffLabel">Бесплатный тариф (на весь сервер 500 запросов в день)</p>
                    </div>
                </div>
                <button class="header-add-btn" onclick="startNewChat()" title="Новый чат">+</button>
            </header>

            <div class="messages-container" id="messagesContainer"></div>

            <footer class="chat-input-area">
                <form id="chatForm" class="input-wrapper">
                    <!-- Заменили на textarea для автопереноса вверх -->
                    <textarea id="userInput" placeholder="Задайте вопрос..." rows="1" autocomplete="off" required></textarea>
                    <button type="submit" id="sendBtn">
                        <!-- Самолетик, смотрящий ровно вправо -->
                        <svg viewBox="0 0 24 24">
                            <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"></path>
                        </svg>
                    </button>
                </form>
            </footer>
        </main>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО НАСТРОЕК -->
    <div class="modal-overlay" id="settingsModalOverlay" onclick="closeModal(event)">
        <div class="settings-modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h4 id="modalTitle">Настройки</h4>
                <button class="close-modal-btn" onclick="closeModal()">✕</button>
            </div>

            <!-- Смена тем -->
            <div class="setting-group">
                <label id="themeLabel">Тема оформления</label>
                <select id="themeSelect" onchange="changeTheme(this.value)">
                    <option value="dark">Темная</option>
                    <option value="purple">Фиолетовая</option>
                    <option value="light">Светлая</option>
                </select>
            </div>

            <!-- Смена языка -->
            <div class="setting-group">
                <label id="langLabel">Язык интерфейса</label>
                <select id="langSelect" onchange="changeLanguage(this.value)">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
            </div>

            <!-- Ссылки -->
            <div class="settings-links">
                <a href="https://t.me/mixqzero" target="_blank" class="settings-link-btn" id="linkTg">Телеграмм канал</a>
                <a href="https://mixqzero.github.io/main" target="_blank" class="settings-link-btn" id="linkMain">Основной сайт</a>
            </div>

            <div class="modal-footer-status">
                <span id="statusLabel">Status:</span> <span class="status-online">Online</span>
            </div>
        </div>
    </div>

    <script>
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');
        const messagesContainer = document.getElementById('messagesContainer');
        const sendBtn = document.getElementById('sendBtn');
        const sidebar = document.getElementById('sidebar');
        const chatsList = document.getElementById('chatsList');
        const modal = document.getElementById('settingsModalOverlay');

        const WORKER_URL = 'https://webai.mqz.workers.dev/'; 

        let allChats = {}; 
        let currentChatId = null;
        const MAX_HISTORY = 16; 
        let currentLang = 'ru';

        // Языковой пакет
        const translations = {
            ru: {
                placeholder: "Задайте вопрос...",
                newChat: "+ Новый чат",
                settings: "⚙️ Настройки",
                modalTitle: "Настройки",
                theme: "Тема оформления",
                lang: "Язык интерфейса",
                tg: "Телеграмм канал",
                mainSite: "Основной сайт",
                tariff: "Бесплатный тариф (на весь сервер 500 запросов в день)",
                greeting: "Привет! Я твой ИИ-помощник на базе Gemini 3.1 Flash Lite. Задавай любой вопрос!",
                errorNet: "❌ Ошибка сети. Проверь статус Воркера и настройки его переменных.",
                loading: "Секунду"
            },
            en: {
                placeholder: "Ask a question...",
                newChat: "+ New Chat",
                settings: "⚙️ Settings",
                modalTitle: "Settings",
                theme: "Theme",
                lang: "Language",
                tg: "Telegram Channel",
                mainSite: "Main Website",
                tariff: "Free Plan (500 requests per day across server)",
                greeting: "Hello! I am your AI assistant powered by Gemini 3.1 Flash Lite. Ask me anything!",
                errorNet: "❌ Network error. Check your Worker status and environment variables.",
                loading: "Hold on"
            }
        };

        window.addEventListener('DOMContentLoaded', () => {
            // Загрузка чатов
            const savedAllChats = localStorage.getItem('mixqzero_all_chats');
            const savedCurrentId = localStorage.getItem('mixqzero_current_chat_id');
            if (savedAllChats) allChats = JSON.parse(savedAllChats);
            
            if (savedCurrentId && allChats[savedCurrentId]) {
                currentChatId = savedCurrentId;
                renderMessages();
            } else {
                startNewChat();
            }
            renderSidebarChats();

            // Загрузка темы
            const savedTheme = localStorage.getItem('mixqzero_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeSelect').value = savedTheme;

            // Загрузка языка
            const savedLang = localStorage.getItem('mixqzero_lang') || 'ru';
            currentLang = savedLang;
            document.getElementById('langSelect').value = savedLang;
            applyLanguage();
        });

        // Автоматическое увеличение высоты инпута (строка растет вверх)
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight - 4) + 'px';
            if(this.value === '') this.style.height = '24px';
        });

        // Отправка по Enter (без Shift)
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.requestSubmit();
            }
        });

        function toggleSidebar() { sidebar.classList.toggle('open'); }
        function openModal() { modal.classList.add('open'); }
        function closeModal() { modal.classList.remove('open'); }

        function changeTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('mixqzero_theme', theme);
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('mixqzero_lang', lang);
            applyLanguage();
        }

        function applyLanguage() {
            const t = translations[currentLang];
            userInput.placeholder = t.placeholder;
            document.getElementById('newChatBtnSide').textContent = t.newChat;
            document.getElementById('settingsBtnLabel').textContent = t.settings;
            document.getElementById('modalTitle').textContent = t.modalTitle;
            document.getElementById('themeLabel').textContent = t.theme;
            document.getElementById('langLabel').textContent = t.lang;
            document.getElementById('linkTg').textContent = t.tg;
            document.getElementById('linkMain').textContent = t.mainSite;
            document.getElementById('serverTariffLabel').textContent = t.tariff;
            
            // Если в чате ничего нет, обновляем приветствие на нужном языке
            if (allChats[currentChatId].history.length === 0) {
                messagesContainer.innerHTML = '';
                appendMessage(t.greeting, 'ai-message', false);
            }
        }

        function startNewChat() {
            currentChatId = 'chat_' + Date.now();
            allChats[currentChatId] = { title: currentLang === 'ru' ? 'Новый чат' : 'New Chat', history: [] };
            saveToLocalStorage();
            renderMessages();
            renderSidebarChats();
            if (sidebar.classList.contains('open')) toggleSidebar();
        }

        function renderSidebarChats() {
            chatsList.innerHTML = '';
            const sortedIds = Object.keys(allChats).sort((a, b) => b.split('_')[1] - a.split('_')[1]);
            
            sortedIds.forEach(id => {
                const item = document.createElement('div');
                item.classList.add('chat-history-item');
                if (id === currentChatId) item.classList.add('active');
                
                const titleSpan = document.createElement('span');
                titleSpan.textContent = allChats[id].title;
                titleSpan.style.overflow = 'hidden';
                titleSpan.style.textOverflow = 'ellipsis';
                item.appendChild(titleSpan);
                
                const delBtn = document.createElement('button');
                delBtn.classList.add('delete-chat-btn');
                delBtn.innerHTML = '✕';
                delBtn.onclick = (e) => { e.stopPropagation(); deleteChat(id); };
                item.appendChild(delBtn);

                item.onclick = () => {
                    currentChatId = id;
                    localStorage.setItem('mixqzero_current_chat_id', currentChatId);
                    renderMessages();
                    renderSidebarChats();
                    if (window.innerWidth <= 768) toggleSidebar();
                };
                chatsList.appendChild(item);
            });
        }

        function renderMessages() {
            messagesContainer.innerHTML = '';
            const history = allChats[currentChatId].history;
            if (history.length === 0) {
                appendMessage(translations[currentLang].greeting, 'ai-message', false);
            } else {
                history.forEach(msg => {
                    const className = msg.role === 'user' ? 'user-message' : 'ai-message';
                    appendMessage(msg.parts[0].text, className, false);
                });
            }
        }

        function deleteChat(id) {
            delete allChats[id];
            saveToLocalStorage();
            if (currentChatId === id) {
                const keys = Object.keys(allChats);
                if (keys.length > 0) currentChatId = keys[keys.length - 1];
                else { startNewChat(); return; }
            }
            renderMessages();
            renderSidebarChats();
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            userInput.style.height = '24px'; // Сбрасываем высоту textarea
            userInput.disabled = true;
            sendBtn.disabled = true;

            // Навешиваем название чата строго по началу ПЕРВОГО запроса пользователя
            if (allChats[currentChatId].history.length === 0) {
                allChats[currentChatId].title = text.length > 22 ? text.substring(0, 20) + '...' : text;
                renderSidebarChats();
            }

            appendMessage(text, 'user-message', false);
            allChats[currentChatId].history.push({ role: 'user', parts: [{ text: text }] });
            saveToLocalStorage();

            const loadingElement = appendMessage(`<div class="loading-dots">${translations[currentLang].loading}<span>.</span><span>.</span><span>.</span></div>`, 'ai-message', false);

            try {
                let historyToSend = allChats[currentChatId].history;
                if (historyToSend.length > MAX_HISTORY) {
                    historyToSend = historyToSend.slice(-MAX_HISTORY);
                }

                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: historyToSend })
                });

                const data = await response.json();
                loadingElement.remove();

                if (response.ok && data.reply) {
                    const aiReply = data.reply;
                    allChats[currentChatId].history.push({ role: 'model', parts: [{ text: aiReply }] });
                    saveToLocalStorage();
                    appendMessage(aiReply, 'ai-message', true);
                } else {
                    appendMessage(`❌ Error: ${data.error || 'Failed to get answer'}`, 'ai-message', false);
                }

            } catch (error) {
                console.error(error);
                loadingElement.remove();
                appendMessage(translations[currentLang].errorNet, 'ai-message', false);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        });

        function appendMessage(content, className, typeEffect = false) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', className);
            messagesContainer.appendChild(messageDiv);
            
            if (typeEffect) {
                let index = 0;
                const speed = 10; 
                function typeWriter() {
                    if (index < content.length) {
                        messageDiv.textContent += content.charAt(index);
                        index++;
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                        setTimeout(typeWriter, speed);
                    }
                }
                typeWriter();
            } else {
                messageDiv.innerHTML = content;
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
            return messageDiv;
        }

        function saveToLocalStorage() {
            localStorage.setItem('mixqzero_all_chats', JSON.stringify(allChats));
            localStorage.setItem('mixqzero_current_chat_id', currentChatId);
        }
    </script>
</body>
</html>
